<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برای بهترین پدر دنیا ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:linear-gradient(135deg,#4facfe,#6a11cb);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
width:90%;
max-width:450px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
z-index:5;
position:relative;
}

input{
width:100%;
padding:12px;
margin:15px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:17px;
}

button{
background:#ff4081;
color:white;
border:none;
padding:12px 35px;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#e91e63;
}

#message{
display:none;
}

#text{
font-size:24px;
line-height:2;
color:#444;
min-height:180px;
}

#nameShow{
color:#1565c0;
margin-bottom:15px;
}

.heart{
position:absolute;
color:red;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-50px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>

</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div id="form">
<h2>سلام ❤️</h2>
<p>لطفاً اسم و فامیلت رو وارد کن.</p>

<input id="name" placeholder="اسم و فامیل">

<button onclick="start()">ادامه</button>
</div>

<div id="message">
<h2 id="nameShow"></h2>

<div id="text"></div>

<div style="font-size:45px;margin-top:20px;">
❤️🌹🥹
</div>

</div>

</div>

<script>

const message =
"پدرم، ببین چقدر دوستت دارم که برات یه سایت ساختم فقط برای اینکه بهت بگم خسته نباشی. ❤️\n\nهمیشه زحمت کشیدی، همیشه کنارم بودی و شاید هیچ وقت نتونم محبت‌هات رو جبران کنم.\n\nدوستت دارم بهترین بابای دنیا. 🌹";

function start(){

let name=document.getElementById("name").value.trim();

if(name==""){
alert("لطفاً اسم و فامیلت رو وارد کن.");
return;
}

document.getElementById("form").style.display="none";
document.getElementById("message").style.display="block";

document.getElementById("nameShow").innerHTML="سلام " + name + " ❤️";

document.getElementById("music").play().catch(()=>{});

fireworks();
hearts();
typeWriter();

}

function typeWriter(){

let i=0;

let speed=45;

function typing(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i);

i++;

setTimeout(typing,speed);

}

}

typing();

}

function hearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},250);

}

function fireworks(){

for(let i=0;i<120;i++){

let spark=document.createElement("div");

spark.style.position="absolute";

spark.style.width="8px";

spark.style.height="8px";

spark.style.borderRadius="50%";

spark.style.background=`hsl(${Math.random()*360},100%,50%)`;

spark.style.left="50%";

spark.style.top="50%";

spark.style.zIndex="2";

let x=(Math.random()-0.5)*900;

let y=(Math.random()-0.5)*900;

spark.animate([

{transform:"translate(0,0)",opacity:1},

{transform:`translate(${x}px,${y}px)`,opacity:0}

],{

duration:1800

});

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1800);

}

}

</script>

</body>
</html>
